name: EAS Build & Submit

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      submit:
        description: 'Submit to store after build'
        required: false
        default: false
        type: boolean

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate development config
        env:
          APP_ENV: development
        run: npm run verify:config -- --profile development

      - name: Verify Expo config resolution
        run: npm run verify:expo-config

      - name: Run TypeScript
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint -- --max-warnings=0

      - name: Run tests
        run: npm run test:ci

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          if-no-files-found: ignore
          path: |
            junit.xml

  build-ios:
    name: Build iOS
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios') ||
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Validate iOS build config
        env:
          APP_ENV: ${{ github.event.inputs.profile || 'production' }}
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
          EXPO_PUBLIC_EAS_PROJECT_ID: ${{ vars.EXPO_PUBLIC_EAS_PROJECT_ID }}
          EAS_UPDATE_URL: ${{ secrets.EAS_UPDATE_URL }}
          EXPO_PUBLIC_EAS_UPDATE_URL: ${{ vars.EXPO_PUBLIC_EAS_UPDATE_URL }}
          EXPO_PUBLIC_BILLING_PROVIDER: ${{ vars.EXPO_PUBLIC_BILLING_PROVIDER }}
        run: npm run verify:config -- --profile $APP_ENV

      - name: Verify Expo config resolution
        run: npm run verify:expo-config

      - name: Build iOS
        run: |
          PROFILE=${{ github.event.inputs.profile || 'production' }}
          eas build --platform ios --profile $PROFILE --non-interactive

      # Crashlytics dSYM upload — the @react-native-firebase/crashlytics
      # build phase uploads symbols automatically when GoogleService-Info.plist
      # is present at build time. We additionally trigger an explicit upload
      # so symbols are guaranteed to be available before a release is
      # promoted, even if Apple processes a fresh dSYM out-of-band.
      - name: Upload iOS Crashlytics symbols
        if: env.FIREBASE_APP_ID_IOS != ''
        env:
          FIREBASE_APP_ID_IOS: ${{ secrets.FIREBASE_APP_ID_IOS }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          set -e
          npm install --no-save firebase-tools@latest
          # EAS provides the build dSYM tarball via `eas build:list --latest`.
          BUILD_ARTIFACT_URL=$(eas build:list --platform ios --limit 1 --json --non-interactive | jq -r '.[0].artifacts.applicationArchiveUrl')
          if [ -z "$BUILD_ARTIFACT_URL" ] || [ "$BUILD_ARTIFACT_URL" = "null" ]; then
            echo "Could not resolve iOS build artifact URL — skipping symbol upload."
            exit 0
          fi
          curl -L -o ios-build.tar.gz "$BUILD_ARTIFACT_URL"
          mkdir -p ios-symbols && tar -xzf ios-build.tar.gz -C ios-symbols || true
          npx firebase crashlytics:symbols:upload \
            --app=$FIREBASE_APP_ID_IOS \
            --token=$FIREBASE_TOKEN \
            ios-symbols || echo "Crashlytics symbol upload failed (non-fatal). Investigate before next release."

      - name: Submit to App Store
        if: |
          github.event.inputs.submit == 'true' ||
          startsWith(github.ref, 'refs/tags/v')
        run: eas submit --platform ios --latest --non-interactive
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android') ||
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Validate Android build config
        env:
          APP_ENV: ${{ github.event.inputs.profile || 'production' }}
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
          EXPO_PUBLIC_EAS_PROJECT_ID: ${{ vars.EXPO_PUBLIC_EAS_PROJECT_ID }}
          EAS_UPDATE_URL: ${{ secrets.EAS_UPDATE_URL }}
          EXPO_PUBLIC_EAS_UPDATE_URL: ${{ vars.EXPO_PUBLIC_EAS_UPDATE_URL }}
          EXPO_PUBLIC_BILLING_PROVIDER: ${{ vars.EXPO_PUBLIC_BILLING_PROVIDER }}
        run: npm run verify:config -- --profile $APP_ENV

      - name: Verify Expo config resolution
        run: npm run verify:expo-config

      - name: Build Android
        run: |
          PROFILE=${{ github.event.inputs.profile || 'production' }}
          eas build --platform android --profile $PROFILE --non-interactive

      # ProGuard / R8 mapping upload — when minification is on (E-SEC2 set this
      # to true in gradle.properties), Crashlytics needs the mapping file to
      # deobfuscate stack traces. The Gradle plugin uploads automatically when
      # configured, but we trigger an explicit upload here so it survives a
      # plugin misconfiguration silently dropping mappings.
      - name: Upload Android Crashlytics mapping file
        if: env.FIREBASE_APP_ID_ANDROID != ''
        env:
          FIREBASE_APP_ID_ANDROID: ${{ secrets.FIREBASE_APP_ID_ANDROID }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          set -e
          MAPPING_PATH="android/app/build/outputs/mapping/release/mapping.txt"
          if [ ! -f "$MAPPING_PATH" ]; then
            echo "ProGuard mapping not produced locally (build ran on EAS workers). Skipping local upload."
            exit 0
          fi
          npm install --no-save firebase-tools@latest
          npx firebase crashlytics:mappingfile:upload \
            --app=$FIREBASE_APP_ID_ANDROID \
            --token=$FIREBASE_TOKEN \
            "$MAPPING_PATH" || echo "Crashlytics mapping upload failed (non-fatal). Investigate before next release."

      - name: Submit to Google Play
        if: |
          github.event.inputs.submit == 'true' ||
          startsWith(github.ref, 'refs/tags/v')
        run: eas submit --platform android --latest --non-interactive

  preview-build:
    name: Preview Build (PR)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Validate preview build config
        env:
          APP_ENV: preview
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
          EXPO_PUBLIC_EAS_PROJECT_ID: ${{ vars.EXPO_PUBLIC_EAS_PROJECT_ID }}
          EAS_UPDATE_URL: ${{ secrets.EAS_UPDATE_URL }}
          EXPO_PUBLIC_EAS_UPDATE_URL: ${{ vars.EXPO_PUBLIC_EAS_UPDATE_URL }}
          EXPO_PUBLIC_BILLING_PROVIDER: ${{ vars.EXPO_PUBLIC_BILLING_PROVIDER }}
        run: npm run verify:config -- --profile preview

      - name: Verify Expo config resolution
        run: npm run verify:expo-config

      - name: Create preview build
        run: eas build --platform all --profile preview --non-interactive

      - name: Comment PR with build link
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Preview Build Ready\n\nCheck the [Expo Dashboard](https://expo.dev) for build download links.'
            })
